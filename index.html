<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>De Souza x Bloomfield Sweepstake</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow Condensed:wght@700&family=Outfit:wght@400;600&family=Roboto Condensed:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1218;--card:#151a22;--muted:#c5bcaf;--gold:#d7ae43;--accent1:#e14444;--accent2:#5b82ea;--radius:18px;--pad:14px}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:Outfit,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:#f5f0e7;background:linear-gradient(180deg,rgba(9,10,12,1),rgba(9,10,12,1))}
.container{max-width:720px;margin:0 auto;padding:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand{display:flex;align-items:center;gap:10px}
.fifalogo{font-family:'Roboto Condensed',Barlow Condensed,system-ui;font-weight:700;font-size:22px;letter-spacing:-0.8px;line-height:0.9;color:#f5f0e7;text-transform:uppercase;display:inline-grid;align-items:center;justify-content:center;padding:4px 8px;border-radius:10px;background:linear-gradient(135deg,rgba(255,255,255,0.04),transparent);border:1px solid rgba(255,255,255,0.06)}
.fifalogo .stack{display:block;line-height:0.88;text-align:center}
.fifalogo .top{display:block;font-size:17px;letter-spacing:-0.7px}
.fifalogo .bot{display:block;font-size:13px;color:#d7ae43;letter-spacing:0.1em}
h1{font-family:Barlow Condensed,system-ui;font-size:14px;margin:0}
.small{color:var(--muted);font-size:12px}
.btn{padding:8px 10px;border-radius:999px;border:0;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#fff;font-weight:700;font-size:13px}
.btn-ghost{padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);font-weight:600;font-size:12px}
.card{background:var(--card);border-radius:14px;padding:14px;margin:10px 0}
.leadergrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tile{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:12px;border-radius:12px}
.tile h3{margin:0;font-size:15px}
.tile p{margin:6px 0 0;color:var(--muted);font-size:13px}
.center{display:flex;align-items:center;justify-content:center}
.focus-page{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.85));display:none;padding:18px;overflow:auto}
.focus-content{max-width:520px;margin:0 auto}
.focus-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.big{font-size:22px;font-weight:700}
.kv{font-size:13px;color:var(--muted)}
.footer{height:64px}
@media (max-width:420px){.leadergrid{grid-template-columns:1fr 1fr}.focus-tiles{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="brand">
      <div class="fifalogo" aria-label="FIFA 2026">
        <span class="stack"><span class="top">fifa</span><span class="bot">2026</span></span>
      </div>
      <div><h1>De Souza × Bloomfield</h1><div class="small">World Cup 2026</div></div>
    </div>
    <button id="download" class="btn">Export</button>
  </div>

  <div class="card">
    <div class="small">Leaderboard</div>
    <div class="leadergrid" id="leaderTiles"></div>
  </div>

  <div class="card">
    <div class="small">Scorekeeper</div>
    <form id="matchForm">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select id="matchTeam"></select>
        <input id="opponent" placeholder="Opponent" required />
        <input id="goalsFor" type="number" min="0" placeholder="GF" required />
        <input id="goalsAgainst" type="number" min="0" placeholder="GA" required />
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <select id="stage"><option value="group">Group</option><option value="r32">R32</option><option value="r16">R16</option><option value="quarter">QF</option><option value="semi">SF</option><option value="final">Final</option><option value="winner">Winner</option></select>
        <button class="btn" type="submit">Add</button>
      </div>
    </form>
  </div>

  <div style="height:14px"></div>
  <div class="small center">Click on tile to open detail view</div>
  <div class="footer"></div>
</div>

<div id="focus" class="focus-page">
  <div class="focus-content card" id="focusContent">
    <div style="display:flex;justify-content:space-between;align-items:center"><h2 id="focusName"></h2><button id="closeFocus" class="btn-ghost">✕</button></div>
    <div class="small" id="focusGroups"></div>
    <div class="focus-tiles" id="focusTiles"></div>
  </div>
</div>

<script>
const participants=[
{name:'Michelle',groups:['Group A','Group G'],teams:['Mexico','South Africa','Korea Republic','Czechia','Belgium','Egypt','Iran','New Zealand']},
{name:'Caleb',groups:['Group B','Group H'],teams:['Canada','Switzerland','Qatar','Bosnia & Herzegovina','Spain','Uruguay','Saudi Arabia','Cabo Verde']},
{name:'Anton',groups:['Group C','Group I'],teams:['Brazil','Morocco','Scotland','Haiti','France','Senegal','Norway','Iraq']},
{name:'Jade',groups:['Group D','Group J'],teams:['United States','Paraguay','Australia','Türkiye','Argentina','Algeria','Austria','Jordan']},
{name:'Henry',groups:['Group E','Group K'],teams:['Germany',"Côte d'Ivoire",'Ecuador','Curaçao','Portugal','Colombia','Uzbekistan','DR Congo']},
{name:'Cloe',groups:['Group F','Group L'],teams:['Netherlands','Japan','Sweden','Tunisia','England','Croatia','Ghana','Panama']}
];
const scoring={groupWin:3,groupDraw:1,groupFirst:5,groupSecond:3,r32:2,r16:3,quarter:5,semi:7,final:10,winner:15};
let matchLog=[];
function points(m){if(m.stage==='group'){if(m.goalsFor>m.goalsAgainst)return scoring.groupWin;if(m.goalsFor===m.goalsAgainst)return scoring.groupDraw;return 0}return scoring[m.stage]||0}
function compute(){return participants.map(p=>{const owned=matchLog.filter(m=>p.teams.includes(m.team));const pts=owned.reduce((a,m)=>a+points(m),0);const gd=owned.reduce((a,m)=>a+(m.goalsFor-m.goalsAgainst),0);const gf=owned.reduce((a,m)=>a+m.goalsFor,0);return {...p,pts,gd,gf}}).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name))}
function renderLeaderboard(){const el=document.getElementById('leaderTiles');el.innerHTML='';compute().forEach((p)=>{const div=document.createElement('div');div.className='tile';div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center"><div><h3>${p.name}</h3><div class="kv">${p.groups.join(' + ')}</div></div><div style="text-align:right"><div class="big">${p.pts}</div><div class="kv">pts</div></div></div><div style="margin-top:8px" class="kv">GD ${p.gd} · GF ${p.gf}</div>`;div.onclick=()=>openFocus(p.name);el.appendChild(div)})}
function openFocus(name){const panel=document.getElementById('focus');const p=participants.find(x=>x.name===name);if(!p){panel.style.display='none';return}document.getElementById('focusName').textContent=p.name;document.getElementById('focusGroups').textContent=p.groups.join(' and ');const tiles=document.getElementById('focusTiles');tiles.innerHTML='';const stats=compute().find(x=>x.name===p.name);tiles.innerHTML=`<div class="tile"><h3>Points</h3><p class="big">${stats.pts}</p></div><div class="tile"><h3>Goal diff</h3><p class="big">${stats.gd>0?'+':''}${stats.gd}</p></div><div class="tile"><h3>Goals</h3><p class="big">${stats.gf}</p></div><div class="tile"><h3>Teams</h3><p class="kv">${p.teams.join(', ')}</p></div>`;panel.style.display='block';panel.scrollTop=0}
function closeFocus(){document.getElementById('focus').style.display='none'}
function populateSelect(){const sel=document.getElementById('matchTeam');sel.innerHTML=participants.flatMap(p=>p.teams.map(t=>`<option value="${t}">${t} · ${p.name}</option>`)).join('')}
function download(){const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),matchLog},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='matches.json';a.click();URL.revokeObjectURL(a.href)}
document.getElementById('leaderTiles').addEventListener('click',e=>{const t=e.target.closest('.tile');if(t){const name=t.querySelector('h3').textContent;openFocus(name)}});
document.getElementById('closeFocus').addEventListener('click',closeFocus);
document.getElementById('matchForm').addEventListener('submit',e=>{e.preventDefault();const entry={team:document.getElementById('matchTeam').value,opponent:document.getElementById('opponent').value,goalsFor:+document.getElementById('goalsFor').value,goalsAgainst:+document.getElementById('goalsAgainst').value,stage:document.getElementById('stage').value};matchLog.push(entry);renderLeaderboard();document.getElementById('matchForm').reset()});
document.getElementById('download').addEventListener('click',download);
renderLeaderboard();populateSelect();
</script>
</body>
</html>
