<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>De Souza x Bloomfield Sweepstake</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow Condensed:wght@700&family=Outfit:wght@400;600&family=Roboto Condensed:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1218;--card:#151a22;--muted:#c5bcaf;--gold:#d7ae43;--accent1:#e14444;--accent2:#5b82ea;--radius:18px}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:Outfit,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:#f5f0e7;background:linear-gradient(180deg,#0f1218,#0f1218)}
.container{max-width:720px;margin:0 auto;padding:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand{display:flex;align-items:center;gap:10px}
.fifalogo{font-family:'Roboto Condensed',Barlow Condensed,system-ui;font-weight:700;font-size:22px;letter-spacing:-0.8px;line-height:0.9;color:#f5f0e7;text-transform:uppercase;display:inline-grid;align-items:center;justify-content:center;padding:4px 8px;border-radius:10px;background:linear-gradient(135deg,rgba(255,255,255,0.04),transparent);border:1px solid rgba(255,255,255,0.06)}
.fifalogo .stack{display:block;line-height:0.88;text-align:center}
.fifalogo .top{display:block;font-size:17px;letter-spacing:-0.7px}
.fifalogo .bot{display:block;font-size:13px;color:#d7ae43;letter-spacing:0.1em}
h1{font-family:Barlow Condensed,system-ui;font-size:14px;margin:0}
.small{color:var(--muted);font-size:12px}
.btn{padding:8px 10px;border-radius:999px;border:0;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#fff;font-weight:700;font-size:13px}
.btn-ghost{padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);font-weight:600;font-size:12px}
.card{background:var(--card);border-radius:14px;padding:14px;margin:10px 0}
.leadergrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tile{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:12px;border-radius:12px}
.tile h3{margin:0;font-size:15px}
.tile p{margin:6px 0 0;color:var(--muted);font-size:13px}
.center{display:flex;align-items:center;justify-content:center}
.matches-section{margin-top:10px}
.matches-title{font-size:14px;font-weight:700;margin-bottom:8px}
.match-row{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:10px;background:rgba(255,255,255,0.02);margin-bottom:6px;font-size:14px}
.flag{font-size:16px;margin-right:6px}
.focus-page{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.85));display:none;padding:18px;overflow:auto}
.focus-content{max-width:520px;margin:0 auto}
.focus-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.big{font-size:22px;font-weight:700}
.kv{font-size:13px;color:var(--muted)}
.footer{height:64px}
@media (max-width:420px){.leadergrid{grid-template-columns:1fr 1fr}.focus-tiles{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="brand">
      <div class="fifalogo" aria-label="FIFA 2026">
        <span class="stack"><span class="top">fifa</span><span class="bot">2026</span></span>
      </div>
      <div><h1>De Souza × Bloomfield</h1><div class="small">World Cup 2026</div></div>
    </div>
  </div>

  <div class="card">
    <div class="small">Leaderboard</div>
    <div class="leadergrid" id="leaderTiles"></div>
  </div>

  <div class="card matches-section">
    <div class="matches-title">Latest Matches</div>
    <div id="matchesList"></div>
  </div>

  <div style="height:14px"></div>
  <div class="small center">Click on tile to open detail view</div>
  <div class="footer"></div>
</div>

<div id="focus" class="focus-page">
  <div class="focus-content card" id="focusContent">
    <div style="display:flex;justify-content:space-between;align-items:center"><h2 id="focusName"></h2><button id="closeFocus" class="btn-ghost">✕</button></div>
    <div class="small" id="focusGroups"></div>
    <div class="focus-tiles" id="focusTiles"></div>
  </div>
</div>

<script>
const participants=[
{name:'Michelle',groups:['Group A','Group G'],teams:['Mexico','South Africa','Korea Republic','Czechia','Belgium','Egypt','Iran','New Zealand']},
{name:'Caleb',groups:['Group B','Group H'],teams:['Canada','Switzerland','Qatar','Bosnia and Herzegovina','Spain','Uruguay','Saudi Arabia','Cabo Verde']},
{name:'Anton',groups:['Group C','Group I'],teams:['Brazil','Morocco','Scotland','Haiti','France','Senegal','Norway','Iraq']},
{name:'Jade',groups:['Group D','Group J'],teams:['USA','Paraguay','Australia','Türkiye','Argentina','Algeria','Austria','Jordan']},
{name:'Henry',groups:['Group E','Group K'],teams:['Germany',"Côte d'Ivoire",'Ecuador','Curaçao','Portugal','Colombia','Uzbekistan','DR Congo']},
{name:'Cloe',groups:['Group F','Group L'],teams:['Netherlands','Japan','Sweden','Tunisia','England','Croatia','Ghana','Panama']}
];

const teamFlags={
'Mexico':'🇲🇽','South Africa':'🇿🇦','Korea Republic':'🇰🇷','Czechia':'🇨🇿','Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿',
'Canada':'🇨🇦','Switzerland':'🇨🇭','Qatar':'🇶🇦','Bosnia and Herzegovina':'🇧🇦','Spain':'🇪🇸','Uruguay':'🇺🇾','Saudi Arabia':'🇸🇦','Cabo Verde':'🇨🇻',
'Brazil':'🇧🇷','Morocco':'🇲🇦','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Haiti':'🇭🇹','France':'🇫🇷','Senegal':'🇸🇳','Norway':'🇳🇴','Iraq':'🇮🇶',
'USA':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Türkiye':'🇹🇷','Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
'Germany':'🇩🇪',"Côte d'Ivoire":"🇨🇮",'Ecuador':'🇪🇨','Curaçao':'🇨🇼','Portugal':'🇵🇹','Colombia':'🇨🇴','Uzbekistan':'🇺🇿','DR Congo':'🇨🇬',
'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦'
};

const API_KEY = 'zwc_free_4ed9f776b2637c01390c0ae7';

// Fetch matches from Zafronix API
async function fetchMatches() {
  try {
    const response = await fetch('https://api.zafronix.com/fifa/worldcup/v1/tournaments/2026/matches', {
      headers: { 'X-API-Key': API_KEY }
    });
    const data = await response.json();
    return data.matches || [];
  } catch (err) {
    console.error('Failed to fetch matches:', err);
    return [];
  }
}

// Calculate family points from API results
function calculateFamilyStandings(matches) {
  const family = {
    'Michelle': ['Mexico','South Africa','Korea Republic','Czechia','Belgium','Egypt','Iran','New Zealand'],
    'Caleb': ['Canada','Switzerland','Qatar','Bosnia and Herzegovina','Spain','Uruguay','Saudi Arabia','Cabo Verde'],
    'Anton': ['Brazil','Morocco','Scotland','Haiti','France','Senegal','Norway','Iraq'],
    'Jade': ['USA','Paraguay','Australia','Türkiye','Argentina','Algeria','Austria','Jordan'],
    'Henry': ['Germany',"Côte d'Ivoire",'Ecuador','Curaçao','Portugal','Colombia','Uzbekistan','DR Congo'],
    'Cloe': ['Netherlands','Japan','Sweden','Tunisia','England','Croatia','Ghana','Panama']
  };
  
  const teamMap = { 'United States': 'USA' };
  
  function getPoints(team) {
    team = teamMap[team] || team;
    for (const m of matches) {
      if (m.status !== 'finished') continue;
      const t1 = teamMap[m.team1.name] || m.team1.name;
      const t2 = teamMap[m.team2.name] || m.team2.name;
      if (t1 === team && m.team1.score > m.team2.score) return 3;
      if (t2 === team && m.team2.score > m.team1.score) return 3;
      if ((t1 === team || t2 === team) && m.team1.score === m.team2.score) return 1;
    }
    return 0;
  }
  
  function computeGDGoals(team) {
    team = teamMap[team] || team;
    let gd = 0, gf = 0;
    for (const m of matches) {
      if (m.status !== 'finished') continue;
      const t1 = teamMap[m.team1.name] || m.team1.name;
      const t2 = teamMap[m.team2.name] || m.team2.name;
      if (t1 === team) { gd += m.team1.score - m.team2.score; gf += m.team1.score; }
      if (t2 === team) { gd += m.team2.score - m.team1.score; gf += m.team2.score; }
    }
    return { gd, gf };
  }
  
  const standings = {};
  for (const [name, teams] of Object.entries(family)) {
    let pts = 0, totalGD = 0, totalGF = 0;
    for (const t of teams) {
      pts += getPoints(t);
      const { gd, gf } = computeGDGoals(t);
      totalGD += gd;
      totalGF += gf;
    }
    standings[name] = { name, pts, gd: totalGD, gf: totalGF };
  }
  
  return Object.entries(standings)
    .map(x => x[1])
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

// Render matches from API data
function renderMatchesFromAPI(matches) {
  const finished = matches.filter(m => m.status === 'finished');
  const el = document.getElementById('matchesList');
  el.innerHTML = '';
  
  // Sort by match date (newest first)
  finished.sort((a, b) => new Date(b.date) - new Date(a.date));
  
  finished.forEach(m => {
    const flag1 = teamFlags[m.team1.name] || '';
    const flag2 = teamFlags[m.team2.name] || '';
    const row = document.createElement('div');
    row.className = 'match-row';
    row.innerHTML = `<span><span class="flag">${flag1}</span>${m.team1.name}</span><span>${m.team1.score}-${m.team2.score}</span><span><span class="flag">${flag2}</span>${m.team2.name}</span>`;
    el.appendChild(row);
  });
}

// Render leaderboard from API-calculated standings
function renderLeaderboardFromAPI(standings) {
  const el = document.getElementById('leaderTiles');
  el.innerHTML = '';
  standings.forEach(p => {
    const div = document.createElement('div');
    div.className = 'tile';
    div.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><div><h3>${p.name}</h3><div class="kv">${participants.find(x=>x.name===p.name).groups.join(' + ')}</div></div><div style="text-align:right"><div class="big">${p.pts}</div><div class="kv">pts</div></div></div><div style="margin-top:8px" class="kv">GD ${p.gd} · GF ${p.gf}</div>`;
    div.onclick = () => openFocus(p.name);
    el.appendChild(div);
  });
}

// Main update function
async function updateAll() {
  const matches = await fetchMatches();
  if (matches.length === 0) return;
  
  renderMatchesFromAPI(matches);
  const standings = calculateFamilyStandings(matches);
  renderLeaderboardFromAPI(standings);
}

// Initial load and auto-update every 10 minutes
updateAll();
setInterval(updateAll, 10 * 60 * 1000);

function openFocus(name){const panel=document.getElementById('focus');const p=participants.find(x=>x.name===name);if(!p){panel.style.display='none';return}document.getElementById('focusName').textContent=p.name;document.getElementById('focusGroups').textContent=p.groups.join(' and ');const tiles=document.getElementById('focusTiles');tiles.innerHTML='';const stats=participants.find(x=>x.name===name);const apiStats=calculateFamilyStandings([]).find(x=>x.name===name)||{pts:0,gd:0,gf:0};tiles.innerHTML=`<div class="tile"><h3>Points</h3><p class="big">${apiStats.pts}</p></div><div class="tile"><h3>Goal diff</h3><p class="big">${apiStats.gd>0?'+':''}${apiStats.gd}</p></div><div class="tile"><h3>Goals</h3><p class="big">${apiStats.gf}</p></div><div class="tile"><h3>Teams</h3><p class="kv">${stats.teams.join(', ')}</p></div>`;panel.style.display='block';panel.scrollTop=0}
function closeFocus(){document.getElementById('focus').style.display='none'}
document.getElementById('leaderTiles').addEventListener('click',e=>{const t=e.target.closest('.tile');if(t){const name=t.querySelector('h3').textContent;openFocus(name)}});
document.getElementById('closeFocus').addEventListener('click',closeFocus);
</script>
</body>
</html>
